<div class="dev-nav-wrapper" [class.open]="isOpen()">

  <!-- Botón principal -->
  <button class="dev-nav-trigger" (click)="toggle()" [title]="isOpen() ? 'Cerrar menú' : 'Navegación dev'">
    <span class="trigger-icon" [class.rotated]="isOpen()">
        @if (!isOpen()) {
      <svg  xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9"/>
        <line x1="12" y1="3" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="21"/>
        <line x1="3" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="21" y2="12"/>
      </svg>}
        @if (isOpen()) {
      <svg  xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>}
    </span>
  </button>

  <!-- Panel -->
   @if(isOpen()){
  <div class="dev-nav-panel">
    <div class="panel-header">
      <span class="panel-badge">DEV</span>
      <span class="panel-title">Navegación</span>
    </div>

    <nav class="panel-nav">
      @for (route of routes; track route.path) {
        <a class="nav-item"
           [routerLink]="route.path"
           routerLinkActive="active"
           (click)="updatePath(route.path)"
           (click)="toggle()">
          <span class="nav-icon">{{ route.icon }}</span>
          <span class="nav-label">{{ route.label }}</span>
          <span class="nav-arrow">→</span>
        </a>
      }
    </nav>

    <div class="panel-footer">
      <span>{{ currentPath() }}</span>
    </div>
  </div>}

</div>
